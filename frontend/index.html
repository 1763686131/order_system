<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本地订单管理看板 - 工业触屏完全体</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="loginSection" class="login-overlay">
        <div class="login-box">
            <h2>系统登录</h2>
            <input id="loginUsername" placeholder="请输入账号ID" />
            <input id="loginPassword" type="password" placeholder="请输入密码" />
            <button class="btn-primary" onclick="handleLogin()" style="width: 100%;">登录</button>
        </div>
    </div>

    <div id="mainSection" class="hidden main-section">
        <div class="top-nav">
            <div class="nav-left">
                <h2>订单管理看板</h2>
                <div class="user-info">
                    当前登录: <strong id="currentUsername"></strong>
                    <span id="currentUserRoleTag" class="user-tag"></span>
                </div>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰菜单</button>
            <div class="nav-right" id="navRightMenu">
                <button id="btnNavCreateOrder" class="btn-primary hidden" onclick="toggleModal('createOrderModal', true); closeMobileMenu();">📝 发布新订单</button>
                <button id="btnNavUploadMaterial" class="btn-outline-success" onclick="openUploadMaterialModal(); closeMobileMenu();">✍️ 录入原材料</button>
                <button id="btnOpenAddUser" class="btn-outline-primary hidden" onclick="toggleModal('addUserModal', true); closeMobileMenu();">➕ 添加用户</button>
                <button id="btnOpenViewUser" class="btn-outline-info hidden" onclick="openViewUserModal(); closeMobileMenu();">👥 管理用户</button>
                <button class="btn-text-gray" onclick="handleLogout()">退出登录</button>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="content-area">
                <div class="controls-container">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="pending" onclick="switchTab('pending')">未完成订单</button>
                        <button class="tab-btn" data-tab="completed" onclick="switchTab('completed')">已完成订单</button>
                        <button class="tab-btn" data-tab="materials" onclick="switchTab('materials')">原材料数据</button>
                    </div>
                    
                    <div class="date-filter filter-group">
                        <label>日期: </label>
                        <input id="filterStartDate" type="date" onchange="refreshDashboardData()" />
                        <span>至</span>
                        <input id="filterEndDate" type="date" onchange="refreshDashboardData()" />
                    </div>
                </div>
                
                <div id="orderGrid" class="order-grid grid-container"></div>

                <div id="materialViewWrapper" class="material-container hidden">
                    <div class="material-top-bar">
                        <div class="total-stock-box">
                            <span style="font-weight:600; font-size:14px;">原材料储备：</span>
                            <strong id="displayTotalStock" style="color: #409EFF; font-size:16px;">5000 kg</strong>
                            <button id="btnEditStockAction" class="btn-danger hidden" style="padding: 4px 12px; font-size:12px; margin-left:8px; border-radius:12px;" onclick="triggerStockModifyModal()">修改</button>
                        </div>
                        <div id="remainedMaterialCapsule" class="remained-capsule-fixed">剩余原材料：5000 kg</div>
                    </div>
                    <div id="materialCapsuleList" class="capsule-grid-container"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="addUserModal" class="modal-mask hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span>添加系统新用户</span>
                <span class="close-x" onclick="toggleModal('addUserModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label for="newUsername">新账号 ID</label>
                    <input id="newUsername" placeholder="请输入数字或字母账号" />
                </div>
                <div class="form-item">
                    <label for="newPassword">访问密码</label>
                    <input id="newPassword" type="text" placeholder="请输入密码" />
                </div>
                <div class="form-item">
                    <label for="newRole">角色权限分级</label>
                    <select id="newRole">
                        <option value="operator">操作员 (仅看未完成)</option>
                        <option value="admin">管理员 (看全部+发单)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('addUserModal', false)">取消</button>
                <button class="btn-success" onclick="createUser()">确认添加用户</button>
            </div>
        </div>
    </div>

    <div id="viewUserModal" class="modal-mask hidden">
        <div class="modal-box modal-box-wide">
            <div class="modal-header">
                <span>系统用户名单管理</span>
                <span class="close-x" onclick="toggleModal('viewUserModal', false)">&times;</span>
            </div>
            <div class="modal-body" id="userListContainer"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('viewUserModal', false)">关闭窗口</button>
            </div>
        </div>
    </div>

    <div id="createOrderModal" class="modal-mask hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span>📝 发布系统新订单</span>
                <span class="close-x" onclick="toggleModal('createOrderModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label for="newOrderType">订单类型参数:</label>
                    <select id="newOrderType">
                        <option value="0" selected>中固订单</option>
                        <option value="1">绝缘订单</option>
                    </select>
                </div>
                <div class="form-item">
                    <label for="newOrderTitle">文本粘贴区 (请按格式粘贴):</label>
                    <textarea id="newOrderTitle" style="height:100px; font-size:14px; background:#f0f9eb; border-color:#67C23A;" placeholder="格式：
第一行: 客户名 (如 陶芸)
第二行: 收货人 电话 地址 (如 牛华 13068188388 浙江省温州...)
第三行起: 货物规格 (如 粘钢胶40公斤×27组+30*1)"></textarea>
                    <button type="button" class="btn-success" style="width: 100%; margin-top: 8px; font-size: 15px; padding: 10px;" onclick="smartParse('new')">✨ 一键智能识别并填充下方表单</button>
                </div>
                <div style="padding: 10px; background: #f9fafc; border: 1px solid #e4e7ed; border-radius: 6px; margin-bottom: 10px;">
                    <div class="form-item"><label>制单归属 (如: 陶芸):</label><input id="newOrderClient" /></div>
                    <div class="form-item"><label>收货姓名:</label><input id="newReceiverName" /></div>
                    <div class="form-item"><label><span style="color:red;">*</span> 收货电话:</label><input id="newReceiverPhone" placeholder="必须是11位手机或座机(例:0571-88538883)" /></div>
                    <div class="form-item"><label><span style="color:red;">*</span> 收货地址:</label><input id="newReceiverAddress" /></div>
                    <div class="form-item"><label><span style="color:red;">*</span> 货物名称:</label><textarea id="newGoodsName" style="height:50px;"></textarea></div>
                    
                    <div style="display: flex; gap: 10px;">
                        <div class="form-item" style="flex:1;"><label><span style="color:red;">*</span> 货物重量:</label><input id="newGoodsWeight" placeholder="自动计算或手填" /></div>
                        <div class="form-item" style="flex:1;"><label>货物数量:</label><input id="newGoodsQuantity" placeholder="例如: 56件" /></div>
                    </div>
                    
                    <div class="form-item">
                        <label>货物包装:</label>
                        <select id="newGoodsPackaging">
                            <option value="桶装" selected>桶装</option>
                            <option value="袋装">袋装</option>
                            <option value="托盘">托盘</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <label>物流服务:</label>
                        <select id="newLogisticsService">
                            <option value="送货上门+回单拍照回传" selected>送货上门+回单拍照回传</option>
                            <option value="送货上门">送货上门</option>
                            <option value="用户自提">用户自提</option>
                        </select>
                    </div>
                    <div class="form-item"><label>📝 附加备注信息:</label><input id="newOrderRemark" placeholder="选填，例如：加急、替换等..." /></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('createOrderModal', false)">取消</button>
                <button class="btn-success" onclick="createOrder()">上传并发布订单</button>
            </div>
        </div>
    </div>

    <div id="editOrderModal" class="modal-mask hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span>✍️ 修改订单信息 (超级管理员权限)</span>
                <span class="close-x" onclick="toggleModal('editOrderModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <input id="editOrderId" type="hidden" />
                <div class="form-item">
                    <label for="editOrderDate">创建生成时间 (不可轻易改动):</label>
                    <input id="editOrderDate" type="text" />
                </div>
                <div class="form-item">
                    <label for="editOrderType">订单类型参数:</label>
                    <select id="editOrderType">
                        <option value="0">中固订单</option>
                        <option value="1">绝缘订单</option>
                    </select>
                </div>
                <div class="form-item">
                    <label for="editOrderTitle">文本粘贴区 (支持重新识别):</label>
                    <textarea id="editOrderTitle" style="height:60px;"></textarea>
                    <button type="button" class="btn-success" style="width: 100%; margin-top: 5px; font-size: 13px;" onclick="smartParse('edit')">✨ 提取重算文本</button>
                </div>
                <div style="padding: 10px; background: #f9fafc; border: 1px solid #e4e7ed; border-radius: 6px; margin-bottom: 10px;">
                    <div class="form-item"><label>制单归属:</label><input id="editOrderClient" /></div>
                    <div class="form-item"><label>收货姓名:</label><input id="editReceiverName" /></div>
                    <div class="form-item"><label><span style="color:red;">*</span> 收货电话:</label><input id="editReceiverPhone" /></div>
                    <div class="form-item"><label><span style="color:red;">*</span> 收货地址:</label><input id="editReceiverAddress" /></div>
                    <div class="form-item"><label><span style="color:red;">*</span> 货物名称:</label><textarea id="editGoodsName" style="height:50px;"></textarea></div>
                    
                    <div style="display: flex; gap: 10px;">
                        <div class="form-item" style="flex:1;"><label><span style="color:red;">*</span> 货物重量:</label><input id="editGoodsWeight" /></div>
                        <div class="form-item" style="flex:1;"><label>货物数量:</label><input id="editGoodsQuantity" /></div>
                    </div>
                    
                    <div class="form-item">
                        <label>货物包装:</label>
                        <select id="editGoodsPackaging">
                            <option value="桶装">桶装</option>
                            <option value="袋装">袋装</option>
                            <option value="托盘">托盘</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <label>物流服务:</label>
                        <select id="editLogisticsService">
                            <option value="送货上门+回单拍照回传">送货上门+回单拍照回传</option>
                            <option value="送货上门">送货上门</option>
                            <option value="用户自提">用户自提</option>
                        </select>
                    </div>
                    <div class="form-item"><label>📝 附加备注信息:</label><input id="editOrderRemark" /></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('editOrderModal', false)">取消</button>
                <button class="btn-danger" onclick="submitEditOrder()">确认修改</button>
            </div>
        </div>
    </div>

    <div id="statusConfirmModal" class="modal-mask hidden">
        <div class="modal-box modal-box-small">
            <div class="modal-header modal-header-secondary">
                <span>⚠️ 业务操作二次确认</span>
                <span class="close-x" onclick="toggleModal('statusConfirmModal', false)">&times;</span>
            </div>
            <div class="modal-body modal-body-compact">
                <div id="confirmTipText" class="confirm-tip-text" style="font-weight:bold; color:#F56C6C; margin-bottom:10px;"></div>
                <div id="confirmCardPreview" class="confirm-card-preview" style="background:#f9f9f9; padding:15px; border-radius:6px; border:1px solid #ddd;">
                    <div class="confirm-preview-header" style="font-size:12px; color:#409EFF; font-weight:bold; margin-bottom:10px; display:flex; justify-content:space-between;">
                        <span id="previewCardType"></span>
                        <span id="previewCardDate" style="color:#999;"></span>
                    </div>
                    <div id="previewCardTitle" style="font-size:14px; line-height:1.6;"></div>
                </div>
            </div>
            <div class="modal-footer modal-footer-secondary">
                <input id="confirmTargetId" type="hidden" />
                <input id="confirmTargetStatus" type="hidden" />
                <button class="btn-secondary" onclick="toggleModal('statusConfirmModal', false)">取消操作</button>
                <button id="btnConfirmSubmit" class="btn-success" onclick="submitUpdateOrderStatus()">确认变更</button>
            </div>
        </div>
    </div>

    <div id="uploadMaterialModal" class="modal-mask hidden">
        <div class="modal-box" style="max-width: 480px;">
            <div class="modal-header" style="background:#f0f9eb;">
                <span style="color:#67C23A; font-weight:bold;">✍️ 原材料数据录入</span>
                <span class="close-x" onclick="toggleModal('uploadMaterialModal', false)">&times;</span>
            </div>
            <div class="modal-body upload-modal-body">
                <div class="upload-inputs-area">
                    <div class="form-item">
                        <label for="materialInputUse" style="font-weight:bold; color:#F56C6C;">今日消耗原材料 (kg):</label>
                        <input id="materialInputUse" readonly placeholder="点击右侧键盘输入..." class="keyboard-target" onclick="setActiveKeyboardTarget('materialInputUse')" style="background:#fff; font-size:16px; font-weight:bold; border-color:#409EFF;" />
                    </div>
                    <div class="form-item">
                        <label for="materialInputProduct" style="font-weight:bold; color:#67C23A;">出货成品总数量 (kg):</label>
                        <input id="materialInputProduct" readonly placeholder="点击右侧键盘输入..." class="keyboard-target" onclick="setActiveKeyboardTarget('materialInputProduct')" style="background:#fff; font-size:16px; font-weight:bold; border-color:#67C23A;" />
                    </div>
                </div>

                <div class="touch-keyboard-panel">
                    <button class="key-btn" onclick="pressKey('1')">1</button>
                    <button class="key-btn" onclick="pressKey('2')">2</button>
                    <button class="key-btn" onclick="pressKey('3')">3</button>
                    <button class="key-btn" onclick="pressKey('4')">4</button>
                    <button class="key-btn" onclick="pressKey('5')">5</button>
                    <button class="key-btn" onclick="pressKey('6')">6</button>
                    <button class="key-btn" onclick="pressKey('7')">7</button>
                    <button class="key-btn" onclick="pressKey('8')">8</button>
                    <button class="key-btn" onclick="pressKey('9')">9</button>
                    <button class="key-btn" onclick="pressKey('.')">.</button>
                    <button class="key-btn" onclick="pressKey('0')">0</button>
                    <button class="key-btn key-backspace" onclick="pressKey('backspace')">←</button>
                    <button class="key-btn key-clear" onclick="pressKey('clear')" style="grid-column: span 3; font-size:13px; height: 35px; background:#bfbf8c; color:#fff;">清空重输</button>
                </div>
            </div>
            <div class="modal-footer" style="background:#f0f9eb;">
                <button class="btn-secondary" onclick="toggleModal('uploadMaterialModal', false)">取消</button>
                <button class="btn-success" onclick="uploadMaterialRecord()" style="padding:8px 24px;">确认上传</button>
            </div>
        </div>
    </div>

    <div id="editMaterialModal" class="modal-mask hidden">
        <div class="modal-box modal-box-small">
            <div class="modal-header">
                <span>✍️ 修改物料流水明细</span>
                <span class="close-x" onclick="toggleModal('editMaterialModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <input id="editMaterialId" type="hidden" />
                <div class="form-item">
                    <label for="editMaterialUse">原材料使用量 (kg):</label>
                    <input id="editMaterialUse" type="number" step="any" />
                </div>
                <div class="form-item">
                    <label for="editMaterialProduct">成品产出量 (kg):</label>
                    <input id="editMaterialProduct" type="number" step="any" />
                </div>
                <div class="form-item">
                    <label for="editMaterialRemark">附加备注:</label>
                    <input id="editMaterialRemark" type="text" placeholder="可选填，例如：测试损耗、退换等..." />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('editMaterialModal', false)">取消</button>
                <button class="btn-danger" onclick="submitEditMaterial()">确认修改</button>
            </div>
        </div>
    </div>

    <div id="editTotalStockModal" class="modal-mask hidden">
        <div class="modal-box modal-box-small">
            <div class="modal-header">
                <span>🏭 变更工厂总原材料储备量</span>
                <span class="close-x" onclick="toggleModal('editTotalStockModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label for="newStockInput">调整后的总储备量 (kg):</label>
                    <input id="newStockInput" type="number" step="any" placeholder="当前设定默认值为5000" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('editTotalStockModal', false)">取消</button>
                <button class="btn-success" onclick="submitUpdateTotalStockValue()">确认更改</button>
            </div>
        </div>
    </div>

    <div id="uploadSuccessNotifyModal" class="modal-mask hidden" style="z-index: 1000;">
        <div class="modal-box modal-box-small" style="text-align: center; border: 2px solid #67C23A; background: #f0f9eb;">
            <div class="modal-body" style="padding: 30px;">
                <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
                <h3 style="color: #67C23A; font-size: 18px; margin-bottom: 8px;">物料数据上传成功</h3>
                <p style="color: #666; font-size: 13px; line-height: 1.6; white-space: pre-line;" id="successNotifyDetail"></p>
                <button class="btn-success" style="margin-top: 20px; padding: 6px 30px; border-radius: 20px;" onclick="toggleModal('uploadSuccessNotifyModal', false)">我已知晓</button>
            </div>
        </div>
    </div>
<script src="js/main.js"></script>
</body>
</html>
