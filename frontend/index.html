<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地订单管理看板 - 工业触屏完全体</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="loginSection" class="login-overlay">
        <div class="login-box">
            <h2>系统登录</h2>
            <input id="loginUsername" placeholder="请输入账号ID" />
            <input id="loginPassword" type="password" placeholder="请输入密码" />
            <button class="btn-primary" onclick="handleLogin()">登录</button>
        </div>
    </div>

    <div id="mainSection" class="hidden main-section">
        <div class="top-nav">
            <div class="nav-left">
                <h2>订单管理看板</h2>
                <div class="user-info">
                    当前登录: <strong id="currentUsername"></strong>
                    <span id="currentUserRoleTag" class="user-tag"></span>
                </div>
            </div>
            <div class="nav-right">
                <button id="btnSwitchPanel" class="btn-info" onclick="switchDashboardView()">📊 查看原材料数据</button>
                <button id="btnNavCreateOrder" class="btn-primary hidden" onclick="toggleModal('createOrderModal', true)">📝 发布新订单</button>
                <button id="btnNavUploadMaterial" class="btn-success" onclick="openUploadMaterialModal()">✍️ 录入原材料</button>
                
                <button id="btnOpenAddUser" class="btn-success hidden" onclick="toggleModal('addUserModal', true)">➕ 添加用户</button>
                <button id="btnOpenViewUser" class="btn-primary hidden" onclick="openViewUserModal()">👥 查看/管理用户</button>
                <button class="btn-danger" onclick="handleLogout()">退出登录</button>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="content-area">
                <div class="area-header">
                    <div id="listTitle" class="area-title">📋 订单看板列表</div>
                    <div class="filter-group">
                        <span id="statusFilterLabel">状态过滤:</span>
                        <select id="filterStatus" onchange="fetchOrders()">
                            <option value="pending" selected>未完成订单</option>
                            <option value="completed">已完成订单</option>
                        </select>

                        <label class="label-inline">日期范围:</label>
                        <input id="filterStartDate" type="date" onchange="refreshDashboardData()" />
                        <span>至</span>
                        <input id="filterEndDate" type="date" onchange="refreshDashboardData()" />
                    </div>
                </div>
                
                <div id="orderGrid" class="grid-container"></div>

                <div id="materialViewWrapper" class="material-container hidden">
                    <div class="material-top-bar">
                        <div class="total-stock-box">
                            <span style="font-weight:600; font-size:14px;">🏭 工厂总原材料储备：</span>
                            <strong id="displayTotalStock" style="color: #1890ff; font-size:16px;">5000 kg</strong>
                            <button id="btnEditStockAction" class="btn-warning hidden" style="padding: 4px 12px; font-size:11px; margin-left:8px; border-radius:12px;" onclick="triggerStockModifyModal()">✍️ 修改总储备</button>
                        </div>
                        <div id="remainedMaterialCapsule" class="remained-capsule-fixed">剩余原材料：5000 kg</div>
                    </div>
                    <div id="materialCapsuleList" style="display:flex; flex-direction:column; gap:12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="addUserModal" class="modal-mask hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span>添加系统新用户</span>
                <span class="close-x" onclick="toggleModal('addUserModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label for="newUsername">新账号 ID</label>
                    <input id="newUsername" placeholder="请输入数字或字母账号" />
                </div>
                <div class="form-item">
                    <label for="newPassword">访问密码</label>
                    <input id="newPassword" type="text" placeholder="请输入密码" />
                </div>
                <div class="form-item">
                    <label for="newRole">角色权限分级</label>
                    <select id="newRole">
                        <option value="operator">操作员 (仅看未完成)</option>
                        <option value="admin">管理员 (看全部+发单)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('addUserModal', false)">取消</button>
                <button class="btn-success" onclick="createUser()">确认添加用户</button>
            </div>
        </div>
    </div>

    <div id="viewUserModal" class="modal-mask hidden">
        <div class="modal-box modal-box-wide">
            <div class="modal-header">
                <span>系统用户名单管理</span>
                <span class="close-x" onclick="toggleModal('viewUserModal', false)">&times;</span>
            </div>
            <div class="modal-body" id="userListContainer"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('viewUserModal', false)">关闭窗口</button>
            </div>
        </div>
    </div>

    <div id="createOrderModal" class="modal-mask hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span>📝 发布系统新订单</span>
                <span class="close-x" onclick="toggleModal('createOrderModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label for="newOrderType">订单类型参数:</label>
                    <select id="newOrderType">
                        <option value="0" selected>中固订单</option>
                        <option value="1">绝缘订单</option>
                    </select>
                </div>
                <div class="form-item">
                    <label for="newOrderTitle">货物长文本参数或编号 (支持触屏回车):</label>
                    <textarea id="newOrderTitle" style="height:120px;" placeholder="请输入规格参数、地址、桶数配比..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('createOrderModal', false)">取消</button>
                <button class="btn-primary" onclick="createOrder()">上传并发布订单</button>
            </div>
        </div>
    </div>

    <div id="editOrderModal" class="modal-mask hidden">
        <div class="modal-box">
            <div class="modal-header">
                <span>✍️ 修改订单信息 (超级管理员权限)</span>
                <span class="close-x" onclick="toggleModal('editOrderModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <input id="editOrderId" type="hidden" />
                <div class="form-item">
                    <label for="editOrderType">订单类型参数</label>
                    <select id="editOrderType">
                        <option value="0">中固订单</option>
                        <option value="1">绝缘订单</option>
                    </select>
                </div>
                <div class="form-item">
                    <label for="editOrderTitle">订单名称 / 货物长文本参数</label>
                    <textarea id="editOrderTitle" class="textarea-tall"></textarea>
                </div>
                <div class="form-item">
                    <label for="editOrderDate">创建生成时间</label>
                    <input id="editOrderDate" type="text" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('editOrderModal', false)">取消</button>
                <button class="btn-warning" onclick="submitEditOrder()">确认修改</button>
            </div>
        </div>
    </div>

    <div id="statusConfirmModal" class="modal-mask hidden">
        <div class="modal-box modal-box-small">
            <div class="modal-header modal-header-secondary">
                <span>⚠️ 业务操作二次确认</span>
                <span class="close-x" onclick="toggleModal('statusConfirmModal', false)">&times;</span>
            </div>
            <div class="modal-body modal-body-compact">
                <div id="confirmTipText" class="confirm-tip-text"></div>
                <div id="confirmCardPreview" class="confirm-card-preview">
                    <div class="confirm-preview-header">
                        <span id="previewCardType"></span>
                        <span id="previewCardDate"></span>
                    </div>
                    <div id="previewCardTitle"></div>
                </div>
            </div>
            <div class="modal-footer modal-footer-secondary">
                <input id="confirmTargetId" type="hidden" />
                <input id="confirmTargetStatus" type="hidden" />
                <button class="btn-secondary" onclick="toggleModal('statusConfirmModal', false)">取消操作</button>
                <button id="btnConfirmSubmit" class="btn-success" onclick="submitUpdateOrderStatus()">确认变更</button>
            </div>
        </div>
    </div>

    <div id="uploadMaterialModal" class="modal-mask hidden">
        <div class="modal-box" style="max-width: 480px;">
            <div class="modal-header" style="background:#f6ffed;">
                <span style="color:#52c41a; font-weight:bold;">✍️ { 原材料数据录入 }</span>
                <span class="close-x" onclick="toggleModal('uploadMaterialModal', false)">&times;</span>
            </div>
            <div class="modal-body" style="display: flex; gap: 15px; padding: 20px;">
                <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                    <div class="form-item">
                        <label for="materialInputUse" style="font-weight:bold; color:#f5222d;">今日消耗原材料 (kg):</label>
                        <input id="materialInputUse" readonly placeholder="点击右侧键盘输入..." class="keyboard-target" onclick="setActiveKeyboardTarget('materialInputUse')" style="background:#fff; font-size:16px; font-weight:bold; border-color:#91d5ff;" />
                    </div>
                    <div class="form-item">
                        <label for="materialInputProduct" style="font-weight:bold; color:#52c41a;">出货成品总数量 (kg):</label>
                        <input id="materialInputProduct" readonly placeholder="点击右侧键盘输入..." class="keyboard-target" onclick="setActiveKeyboardTarget('materialInputProduct')" style="background:#fff; font-size:16px; font-weight:bold; border-color:#b7eb8f;" />
                    </div>
                </div>

                <div class="touch-keyboard-panel">
                    <button class="key-btn" onclick="pressKey('1')">1</button>
                    <button class="key-btn" onclick="pressKey('2')">2</button>
                    <button class="key-btn" onclick="pressKey('3')">3</button>
                    <button class="key-btn" onclick="pressKey('4')">4</button>
                    <button class="key-btn" onclick="pressKey('5')">5</button>
                    <button class="key-btn" onclick="pressKey('6')">6</button>
                    <button class="key-btn" onclick="pressKey('7')">7</button>
                    <button class="key-btn" onclick="pressKey('8')">8</button>
                    <button class="key-btn" onclick="pressKey('9')">9</button>
                    <button class="key-btn" onclick="pressKey('.')">.</button>
                    <button class="key-btn" onclick="pressKey('0')">0</button>
                    <button class="key-btn key-backspace" onclick="pressKey('backspace')">←</button>
                    <button class="key-btn key-clear" onclick="pressKey('clear')" style="grid-column: span 3; font-size:13px; height: 35px; background:#bfbf8c;">清空重输</button>
                </div>
            </div>
            <div class="modal-footer" style="background:#f6ffed;">
                <button class="btn-secondary" onclick="toggleModal('uploadMaterialModal', false)">取消</button>
                <button class="btn-success" onclick="uploadMaterialRecord()" style="padding:8px 24px;">确认上传数据</button>
            </div>
        </div>
    </div>

    <div id="editMaterialModal" class="modal-mask hidden">
        <div class="modal-box modal-box-small">
            <div class="modal-header">
                <span>✍️ 修改物料记录</span>
                <span class="close-x" onclick="toggleModal('editMaterialModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <input id="editMaterialId" type="hidden" />
                <div class="form-item">
                    <label for="editMaterialUse">原材料使用量 (kg):</label>
                    <input id="editMaterialUse" type="number" step="any" />
                </div>
                <div class="form-item">
                    <label for="editMaterialProduct">成品产出量 (kg):</label>
                    <input id="editMaterialProduct" type="number" step="any" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('editMaterialModal', false)">取消</button>
                <button class="btn-warning" onclick="submitEditMaterial()">确认重组数据</button>
            </div>
        </div>
    </div>

    <div id="editTotalStockModal" class="modal-mask hidden">
        <div class="modal-box modal-box-small">
            <div class="modal-header">
                <span>🏭 变更工厂总原材料储备量</span>
                <span class="close-x" onclick="toggleModal('editTotalStockModal', false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label for="newStockInput">调整后的总储备量 (kg):</label>
                    <input id="newStockInput" type="number" step="any" placeholder="默认值为 5000" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="toggleModal('editTotalStockModal', false)">取消</button>
                <button class="btn-success" onclick="submitUpdateTotalStockValue()">确认更改</button>
            </div>
        </div>
    </div>

    <div id="uploadSuccessNotifyModal" class="modal-mask hidden" style="z-index: 1000;">
        <div class="modal-box modal-box-small" style="text-align: center; border: 2px solid #52c41a; background: #f6ffed;">
            <div class="modal-body" style="padding: 30px;">
                <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
                <h3 style="color: #52c41a; font-size: 18px; margin-bottom: 8px;">物料数据上传成功</h3>
                <p style="color: #666; font-size: 13px; line-height: 1.6; white-space: pre-line;" id="successNotifyDetail"></p>
                <button class="btn-success" style="margin-top: 20px; padding: 6px 30px; border-radius: 20px warm;" onclick="toggleModal('uploadSuccessNotifyModal', false)">我已知晓</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
